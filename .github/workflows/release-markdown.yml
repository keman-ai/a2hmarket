name: Release Skill Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Archive
        run: |
          zip -r skill-package.zip . \
            -x "*.git*" \
            -x ".github/*" \
            -x "*.DS_Store"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: skill-package.zip
          body: "a2hmarket skill package — 包含 SKILL.md 及所有 references 文档。"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
