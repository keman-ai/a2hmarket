name: Release Skill Package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read release notes
        id: notes
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            {
              echo "body<<RELEASE_EOF"
              cat RELEASE_NOTES.md
              echo ""
              echo "RELEASE_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            # Fallback: list commits since previous tag
            PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
            if [ -n "$PREV_TAG" ]; then
              COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
            else
              COMMITS=$(git log --pretty=format:"- %s" --no-merges)
            fi
            {
              echo "body<<RELEASE_EOF"
              echo "$COMMITS"
              echo "RELEASE_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create Archive
        run: |
          zip -r skill-package.zip . \
            -x "*.git*" \
            -x ".github/*" \
            -x "*.DS_Store" \
            -x "harness/*" \
            -x "scripts/*" \
            -x "AGENTS.md" \
            -x "CLAUDE.md" \
            -x "RELEASE_NOTES.md"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: skill-package.zip
          body: ${{ steps.notes.outputs.body }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish clean release branch
        run: |
          # 创建干净的 skill-only 目录
          mkdir -p /tmp/skill-clean
          rsync -a --exclude='.git' \
                   --exclude='.github' \
                   --exclude='.gitattributes' \
                   --exclude='harness' \
                   --exclude='scripts' \
                   --exclude='AGENTS.md' \
                   --exclude='CLAUDE.md' \
                   --exclude='RELEASE_NOTES.md' \
                   --exclude='.DS_Store' \
                   . /tmp/skill-clean/

          # 推送到 release 分支
          cd /tmp/skill-clean
          git init
          git checkout -b release
          git add -A
          git commit -m "release ${GITHUB_REF_NAME}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push -f origin release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
